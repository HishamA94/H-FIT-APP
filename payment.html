<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H-FIT | Payment</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: white;
            text-align: center;
            overflow: hidden;
        }

        /* تعديل الخط للانجليزية */
        body.en-mode { font-family: 'Oswald', sans-serif; letter-spacing: 0.5px; }

        .fixed-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(15,15,15,1)), url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center; z-index: -2;
        }

        .glass-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 90%;
            width: 350px;
        }

        .logo-container {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(139, 92, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); }
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #fff;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        h2 { margin: 15px 0 5px; font-size: 1.2rem; font-weight: 900; }
        p { color: #d1d5db; font-size: 0.85rem; margin-top: 0; font-weight: 600; }

        #retry-btn {
            display: none;
            margin-top: 25px;
            background: linear-gradient(to right, #8b5cf6, #ec4899);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.4);
            transition: transform 0.2s;
        }
        #retry-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="fixed-bg"></div>

    <div class="glass-card">
        <div class="logo-container">
            <i class="fa-solid fa-wallet text-3xl text-white"></i>
        </div>
        
        <h2 id="status-text">...</h2>
        <div class="flex items-center gap-2 mt-2">
            <div class="loader"></div>
            <p id="sub-text" style="margin:0">...</p>
        </div>

        <button id="retry-btn" onclick="startPaymentFlow()">...</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        const Pi = window.Pi;
        const statusText = document.getElementById('status-text');
        const subText = document.getElementById('sub-text');
        const retryBtn = document.getElementById('retry-btn');
        
        // --- 🌍 إعدادات اللغة ---
        const currentLang = localStorage.getItem('hfit_lang') || 'ar';
        const isAr = currentLang === 'ar';
        
        // قاموس الترجمة
        const t = {
            ar: {
                title: "H-FIT | جاري الدفع...",
                statusInit: "جاري تأمين الاتصال...",
                subInit: "لحظات ونحولك للمحفظة",
                btnManual: "اضغط للدفع يدوياً 👆",
                statusOpening: "جاري فتح المحفظة الآمنة...",
                statusConfirming: "جاري تأكيد العملية...",
                statusSuccess: "✅ تم بنجاح! مبروك عليك..",
                statusCancel: "تم إلغاء العملية",
                btnRetry: "حاول مرة أخرى",
                statusError: "حدث خطأ غير متوقع",
                statusConnErr: "تعذر الاتصال التلقائي",
                statusManual: "يرجى الضغط للمتابعة"
            },
            en: {
                title: "H-FIT | Processing...",
                statusInit: "Securing Connection...",
                subInit: "Redirecting to Wallet...",
                btnManual: "Pay Manually 👆",
                statusOpening: "Opening Secure Wallet...",
                statusConfirming: "Confirming Transaction...",
                statusSuccess: "✅ Success! Congratulations..",
                statusCancel: "Payment Cancelled",
                btnRetry: "Try Again",
                statusError: "Unexpected Error",
                statusConnErr: "Auto-Connection Failed",
                statusManual: "Click to Continue"
            }
        };

        const txt = t[currentLang]; // اختيار النصوص المناسبة

        // تطبيق اللغة فوراً عند التحميل
        document.title = txt.title;
        statusText.innerText = txt.statusInit;
        subText.innerText = txt.subInit;
        retryBtn.innerText = txt.btnManual;

        if (!isAr) {
            document.getElementById('html-root').setAttribute('dir', 'ltr');
            document.body.classList.add('en-mode');
        }
        // -------------------------

        let currentUser = localStorage.getItem('hfit_username') || "";
        let selectedPrice = parseFloat(localStorage.getItem('hfit_plan_price')) || 1.0;
        let selectedPlan = localStorage.getItem('hfit_plan_type') || 'standard';

        Pi.init({ version: "2.0", sandbox: false });

        async function initProcess() {
            try {
                const scopes = ['username', 'payments'];
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                currentUser = auth.user.username;
                localStorage.setItem('hfit_username', currentUser);
                
                if (typeof _supabase !== 'undefined') ensureUserExists(currentUser);

                // البدء التلقائي
                startPaymentFlow();

            } catch (err) {
                console.error(err);
                statusText.innerText = txt.statusConnErr;
                retryBtn.innerText = txt.btnRetry;
                retryBtn.style.display = "block";
                document.querySelector('.loader').style.display = 'none';
            }
        }

        function startPaymentFlow() {
            statusText.innerText = txt.statusOpening;
            retryBtn.style.display = "none";
            document.querySelector('.loader').style.display = 'block';

            const paymentData = {
                amount: selectedPrice,
                memo: `H-FIT Subscription - ${currentUser}`,
                metadata: { plan: selectedPlan } 
            };

            const callbacks = {
                onReadyForServerApproval: async (paymentId) => {
                    statusText.innerText = txt.statusConfirming;
                    try {
                        await fetch('/.netlify/functions/approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: paymentId })
                        });
                    } catch (error) { console.error("Approval failed", error); }
                },
                onReadyForServerCompletion: async (paymentId, txid) => {
                    statusText.innerText = txt.statusSuccess;
                    
                    try {
                        await fetch('/.netlify/functions/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, txid })
                        });

                        if (typeof _supabase !== 'undefined') {
                            let expiryDate = new Date();
                            expiryDate.setDate(expiryDate.getDate() + 30);
                            await _supabase.from('user_profiles').upsert({ 
                                username: currentUser,
                                subscription_expiry: expiryDate.toISOString(),
                                plan_type: selectedPlan
                            });
                        }

                        setTimeout(() => { window.location.replace('app.html'); }, 1500);

                    } catch (e) { 
                        console.log("Error:", e); 
                        window.location.replace('app.html'); 
                    }
                },
                onCancel: () => { 
                    statusText.innerText = txt.statusCancel; 
                    retryBtn.style.display = "block";
                    retryBtn.innerText = txt.btnRetry;
                    document.querySelector('.loader').style.display = 'none';
                },
                onError: (error) => { 
                    console.error(error);
                    statusText.innerText = txt.statusError;
                    retryBtn.style.display = "block";
                    document.querySelector('.loader').style.display = 'none';
                }
            };

            try {
                Pi.createPayment(paymentData, callbacks);
            } catch (e) {
                statusText.innerText = txt.statusManual;
                retryBtn.style.display = "block";
                document.querySelector('.loader').style.display = 'none';
            }
        }

        async function ensureUserExists(username) {
            try {
                const { data } = await _supabase.from('user_profiles').select('username').eq('username', username).single();
                if (!data) await _supabase.from('user_profiles').insert([{ username: username }]);
            } catch(e) {}
        }

        function onIncompletePaymentFound(payment) { 
            if (payment.transaction && !payment.paid) {
                 fetch('/.netlify/functions/complete', {
                    method: 'POST', body: JSON.stringify({ paymentId: payment.identifier, txid: payment.transaction.txid })
                });
            }
        }

        initProcess();
    </script>
</body>
</html>
