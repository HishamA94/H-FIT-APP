<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدفوعات Pi Network</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <style>
        :root {
            --pi-purple: #5e2a84;
            --pi-gold: #ffa500;
            --bg-color: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .payment-card {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .pi-logo {
            width: 70px;
            height: 70px;
            background: var(--pi-purple);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
        }

        .pi-logo span {
            color: white;
            font-size: 40px;
            font-weight: bold;
        }

        h2 {
            margin: 10px 0;
            color: var(--pi-purple);
        }

        .user-info {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #666;
        }

        #username {
            font-weight: bold;
            color: var(--pi-purple);
        }

        .price-box {
            background: #fff9e6;
            border: 2px solid var(--pi-gold);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .amount {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
        }

        .currency {
            font-size: 1.2rem;
            color: var(--pi-gold);
            font-weight: bold;
        }

        .btn-pay {
            background: var(--pi-purple);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(94, 42, 132, 0.3);
        }

        .btn-pay:hover:not(:disabled) {
            background: #4a1f69;
            transform: translateY(-2px);
        }

        .btn-pay:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }

        .status {
            margin-top: 15px;
            font-size: 0.9rem;
            min-height: 20px;
        }

        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>

    <div class="payment-card">
        <div class="pi-logo"><span>π</span></div>
        
        <h2>بوابة مدفوعات Pi</h2>
        
        <div class="user-info">
            مرحباً، <span id="username">جاري التعرف عليك...</span>
        </div>

        <div class="price-box">
            <div class="amount">1.0</div>
            <div class="currency">Pi Network</div>
        </div>

        <button id="pay-button" class="btn-pay" disabled>تفعيل الدفع</button>
        
        <div id="status-msg" class="status"></div>
    </div>

    <script src="js/supabase-config.js"></script>

<script>
    // تعريف المتغيرات مرة واحدة فقط
    const Pi = window.Pi;
    const statusMsg = document.getElementById('status-msg') || document.createElement('div'); 
    const payButton = document.getElementById('pay-button');
    let currentUser = ""; 

    // تهيئة Pi
    Pi.init({ version: "2.0", sandbox: true }); 

    // دالة الدخول
    async function authenticateUser() {
        try {
            const scopes = ['username', 'payments'];
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            
            currentUser = auth.user.username;
            
            // عرض الاسم (اختياري)
            const usernameDisplay = document.getElementById('username');
            if(usernameDisplay) usernameDisplay.innerText = currentUser;

            // تسجيل الزيارة في قاعدة البيانات
            await registerUserVisit(currentUser);

            if(payButton) payButton.disabled = false;
            console.log("تم تسجيل الدخول: " + currentUser);

        } catch (err) {
            console.error(err);
            if(statusMsg) statusMsg.innerText = "فشل الاتصال: " + err;
        }
    }

    // دالة تسجيل الزيارة في Supabase
    async function registerUserVisit(username) {
        if (typeof _supabase === 'undefined') return;

        const { data, error } = await _supabase
            .from('users')
            .select('*')
            .eq('username', username)
            .single();

        if (data) {
            await _supabase.from('users').update({ visit_count: data.visit_count + 1, last_visit: new Date() }).eq('username', username);
        } else {
            await _supabase.from('users').insert([{ username: username, visit_count: 1 }]);
        }
    }

    function onIncompletePaymentFound(payment) { console.log("Incomplete payment found"); }

    // زر الدفع
    if(payButton) {
        payButton.addEventListener('click', () => {
            const paymentData = {
                amount: 1.0,
                memo: "H-FIT Premium Subscription",
                metadata: { type: "subscription" } 
            };

            const callbacks = {
                onReadyForServerApproval: (paymentId) => { console.log("Approval ready", paymentId); },
                onReadyForServerCompletion: (paymentId, txid) => {
                    if(statusMsg) {
                        statusMsg.innerText = "تم الدفع بنجاح! جاري التوجيه...";
                        statusMsg.style.color = "green";
                    }
                    
                    // تسجيل الدفع وتوجيه المستخدم
                    if (typeof _supabase !== 'undefined') {
                        _supabase.from('payments').insert([{
                            username: currentUser,
                            amount: 1.0,
                            payment_id: paymentId,
                            status: 'Success'
                        }]);
                    }

                    payButton.innerText = "تم ✅";
                    setTimeout(() => { window.location.href = 'app.html'; }, 2000);
                },
                onCancel: (paymentId) => { if(statusMsg) statusMsg.innerText = "تم الإلغاء"; },
                onError: (error, payment) => { if(statusMsg) statusMsg.innerText = "خطأ: " + error; }
            };

            Pi.createPayment(paymentData, callbacks);
        });
    }

    // بدء التشغيل
    authenticateUser();
</script>
</body>
</html>
