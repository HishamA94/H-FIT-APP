<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H-FIT | بوابة الدفع الآمنة</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --pi-purple: #5e2a84; 
            --pi-gold: #ffa500; 
            --glass-bg: rgba(255, 255, 255, 0.15);
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: white;
            overflow: hidden;
        }

        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('assets/صفحة الدفع.jpeg');
            background-size: cover; background-position: center; z-index: -2;
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: -1;
        }

        .payment-card { 
            background: rgba(20, 20, 20, 0.85); 
            padding: 40px; border-radius: 30px; backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            width: 90%; max-width: 400px; text-align: center; 
        }

        .pi-logo { 
            width: 80px; height: 80px; background: var(--pi-purple); 
            border-radius: 50%; display: flex; justify-content: center; 
            align-items: center; margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(94, 42, 132, 0.6);
        }

        .pi-logo span { color: white; font-size: 45px; font-weight: bold; }
        h2 { margin: 10px 0; color: white; font-weight: 900; }
        .user-info { font-size: 1.1rem; margin-bottom: 25px; color: rgba(255,255,255,0.7); }
        #username { font-weight: bold; color: var(--pi-gold); }

        .price-box { 
            background: rgba(255, 255, 255, 0.05); 
            border: 2px solid var(--pi-gold); 
            padding: 20px; border-radius: 20px; margin-bottom: 30px; 
        }

        .amount { font-size: 3rem; font-weight: 900; color: white; }
        .currency { font-size: 1.2rem; color: var(--pi-gold); font-weight: bold; margin-top: 5px; }

        .btn-pay { 
            background: linear-gradient(135deg, #8b5cf6, #5e2a84); 
            color: white; border: none; padding: 18px 40px; 
            font-size: 1.3rem; font-weight: bold; border-radius: 50px; 
            cursor: pointer; width: 100%; transition: all 0.3s ease; 
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); 
        }

        .btn-pay:hover:not(:disabled) { 
            transform: translateY(-3px); box-shadow: 0 15px 30px rgba(139, 92, 246, 0.5);
        }

        .btn-pay:disabled { background: #444; box-shadow: none; cursor: not-allowed; opacity: 0.6; }
        .status { margin-top: 20px; font-size: 0.95rem; min-height: 24px; font-weight: bold; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    <div class="bg-overlay"></div>

    <div class="payment-card">
        <div class="pi-logo"><span>π</span></div>
        <h2 id="plan-title">جاري التحميل...</h2>
        
        <div class="user-info">
            مرحباً، <span id="username">جاري الاتصال...</span>
        </div>

        <div class="price-box">
            <div class="amount" id="display-amount">0.0</div>
            <div class="currency">Pi Network</div>
        </div>

        <button id="pay-button" class="btn-pay" disabled>تأكيد ودفع الآن</button>
        <div id="status-msg" class="status"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
<script>
        const Pi = window.Pi;
        const statusMsg = document.getElementById('status-msg');
        const payButton = document.getElementById('pay-button');
        const displayAmount = document.getElementById('display-amount');
        const planTitle = document.getElementById('plan-title');
        
        let currentUser = "";
        
        // استعادة السعر والخطة من الذاكرة (يتم ضبطها في صفحة الخطط إذا وجدت)
        // إذا لم توجد، نستخدم القيم الافتراضية
        let selectedPrice = parseFloat(localStorage.getItem('hfit_plan_price')) || 1.0;
        let selectedPlan = localStorage.getItem('hfit_plan_type') || 'standard';

        displayAmount.innerText = selectedPrice.toFixed(1);
        planTitle.innerText = selectedPlan === 'premium' ? "اشتراك Premium" : "الاشتراك الأساسي";

        Pi.init({ version: "2.0", sandbox: false });

        async function authenticateUser() {
            try {
                const scopes = ['username', 'payments'];
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                currentUser = auth.user.username;
                document.getElementById('username').innerText = currentUser;
                if(payButton) payButton.disabled = false;
                
                // تسجيل الدخول (اختياري: لتأكد من وجود المستخدم في قاعدة البيانات)
                if (typeof _supabase !== 'undefined') ensureUserExists(currentUser);
            } catch (err) {
                statusMsg.innerText = "فشل الاتصال بـ Pi SDK";
                statusMsg.className = "status error";
                console.error(err);
            }
        }

        // دالة للتأكد أن المستخدم موجود في قاعدة البيانات قبل الدفع
        async function ensureUserExists(username) {
            try {
                const { data, error } = await _supabase.from('user_profiles').select('username').eq('username', username).single();
                if (!data) {
                    await _supabase.from('user_profiles').insert([{ username: username }]);
                }
            } catch(e) { console.log("User check error:", e); }
        }

        function onIncompletePaymentFound(payment) { 
            if (payment.transaction && !payment.paid) {
                 fetch('/.netlify/functions/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId: payment.identifier, txid: payment.transaction.txid })
                });
            }
        }

        if(payButton) {
            payButton.addEventListener('click', () => {
                const paymentData = {
                    amount: selectedPrice,
                    memo: `H-FIT Subscription - ${currentUser}`,
                    metadata: { plan: selectedPlan } 
                };

                const callbacks = {
                    onReadyForServerApproval: async (paymentId) => {
                        statusMsg.innerText = "جاري تأكيد العملية مع الشبكة...";
                        try {
                            await fetch('/.netlify/functions/approve', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ paymentId: paymentId })
                            });
                        } catch (error) { console.error("Approval failed", error); }
                    },
                    onReadyForServerCompletion: async (paymentId, txid) => {
                        statusMsg.innerText = "تم الدفع بنجاح! جاري تفعيل الاشتراك...";
                        statusMsg.className = "status success";
                        payButton.disabled = true;

                        try {
                            // 1. إكمال العملية في شبكة Pi (عبر السيرفر الخلفي)
                            await fetch('/.netlify/functions/complete', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ paymentId, txid })
                            });

                            // 2. تحديث قاعدة البيانات (Supabase) وتمديد الاشتراك
                            if (typeof _supabase !== 'undefined') {
                                
                                // حساب تاريخ الانتهاء الجديد (تاريخ اليوم + 30 يوم)
                                let expiryDate = new Date();
                                expiryDate.setDate(expiryDate.getDate() + 30);

                                // تحديث تاريخ الاشتراك في بروفايل المستخدم
                                const { error } = await _supabase.from('user_profiles').upsert({ 
                                    username: currentUser,
                                    subscription_expiry: expiryDate.toISOString() 
                                });

                                if(error) throw error;
                            }

                            statusMsg.innerText = "تم التفعيل! جاري نقلك للتطبيق...";
                            setTimeout(() => { window.location.href = 'app.html'; }, 2000);

                        } catch (e) { 
                            console.log("خطأ في التفعيل:", e); 
                            statusMsg.innerText = "تم الدفع ولكن حدث خطأ في التفعيل. تواصل مع الدعم.";
                            statusMsg.className = "status error";
                        }
                    },
                    onCancel: () => { 
                        statusMsg.innerText = "تم إلغاء عملية الدفع"; 
                        statusMsg.className = "status error"; 
                    },
                    onError: (error) => { 
                        statusMsg.innerText = "حدث خطأ: " + error.message; 
                        statusMsg.className = "status error"; 
                    }
                };

                Pi.createPayment(paymentData, callbacks);
            });
        }

        authenticateUser();
    </script>
    
</body>
</html>
